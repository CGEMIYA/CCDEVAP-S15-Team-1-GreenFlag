<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <title>Admin View</title>
    </head>
    <body>
        <main class="container">
            <section id="view-admin" class="spa-view active-view">
                <div class="admin-wrapper">
                    <aside class="admin-sidebar">
                        <div class="admin-brand">
                            <h2>Green Flag~</h2>
                        </div>
                        <div class="admin-profile-quick">
                            <span class="icon-placeholder">👤</span>
                            <span class="icon-placeholder">⚙️</span>
                            <span class="icon-placeholder badge-alert">🔔<span>9</span></span>
                        </div>
                        <div class="admin-search-box">
                            <input type="text" placeholder="Search for...">
                        </div>
                        <ul class="admin-nav-menu">
                            <li class="active-admin-li">📋 Dashboard</li>
                        </ul>
                    </aside>

                    <div class="admin-main-panel">
                        <header class="admin-panel-header">
                            <h1>Admin Dashboard</h1>
                            <div class="date-filters">
                                <input type="date" value="2026-06-14">
                                <span>➔</span>
                                <input type="date" value="2026-06-14">
                            </div>
                        </header>

                        <div class="kpi-grid">
                            <div class="kpi-card">
                                <p class="kpi-title">Users Total</p>
                                <p class="kpi-value">11.8M <span class="trend positive">+2.5%</span></p>
                            </div>
                            <div class="kpi-card">
                                <p class="kpi-title">New Users</p>
                                <p class="kpi-value">8.236K <span class="trend negative">-1.2%</span></p>
                            </div>
                            <div class="kpi-card">
                                <p class="kpi-title">Active Users</p>
                                <p class="kpi-value">2.352M <span class="trend positive">+11%</span></p>
                            </div>
                        </div>

                        <div class="charts-matrix">
                            <div class="chart-wrapper-card">
                                <h3>Top 5 Most Reviewed Posts</h3>
                                <div class="chart-container-split">
                                    <div class="canvas-holder">
                                        <canvas id="topPostsChart"></canvas>
                                    </div>
                                    <div class="chart-legend-table">
                                        <table>
                                            <tr><td>⚫ Cafe Masa</td><td>367</td><td><span class="trend positive">+8.2%</span></td></tr>
                                            <tr><td>⚫ Manila Zoo</td><td>159</td><td><span class="trend positive">+7%</span></td></tr>
                                            <tr><td>⚫ 4x4 Photobooth</td><td>134</td><td><span class="trend positive">+2.5%</span></td></tr>
                                            <tr><td>⚫ Benilde Museum</td><td>121</td><td><span class="trend negative">-6.5%</span></td></tr>
                                            <tr><td>⚫ Rooftop Cafe</td><td>73</td><td><span class="trend positive">+1.7%</span></td></tr>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            <div class="chart-wrapper-card">
                                <h3>Most Frequent Tags</h3>
                                <div class="canvas-holder-polar">
                                    <canvas id="tagsPolarChart"></canvas>
                                </div>
                            </div>
                        </div>
                        
                        <button class="exit-admin-btn" onclick="window.location.href='homepage.html'">Exit Admin Dashboard</button>
                    </div>
                </div>
            </section>
        </main>
                    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        <script src="script.js"></script>

    </body>
</html>
