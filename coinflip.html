<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Flip!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="coinstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <button class="menu-btn" id="menu-toggle">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="logo-text" style="cursor: pointer;" onclick="window.location.href='index.html'">
                Green Flag~
            </div>
        </div>
        <div class="nav-center">
            <input type="text" class="search-bar" placeholder="Search...">
        </div>
        <div class="nav-right">
            <button class="theme-toggle" id="theme-btn">🌙</button>
            <div class="auth-links">
                <span>Login</span> |
                <span>Sign Up</span>
            </div>
            <button class="admin-quick-btn" onclick="window.location.href='admin.html'">
                Admin View
            </button>
        </div>
    </nav>

    <div class="sidebar" id="sidebar-menu">
        <div class="sidebar-header">
            <div class="user-avatar-placeholder"></div>
            <div class="user-info">
                <p class="user-name">Account Name</p>
                <p class="user-email">Email Address</p>
            </div>
        </div>
        <hr>
        <ul class="sidebar-links">
            <li onclick="window.location.href='index.html'">Home</li>
            <li onclick="window.location.href='homepage_extended.html'">Saved Spots</li>
            <li>Forums</li>
            <li class="verified-only" style="display: block; color: var(--accent-green);" onclick="window.location.href='coinflip.html'">🪙 Coin Flip</li>
            <li class="verified-only" onclick="window.location.href='wheel.html'">✨ Spin The Wheel</li>
            <li class="toggle-verification-mock" onclick="toggleVerificationMock()">🔄 Toggle Verified UI</li>
        </ul>
        <hr>
        <ul class="sidebar-links">
            <li onclick="switchView('view-settings')">Settings</li>
            <li onclick="switchView('view-account')">My Account</li>
            <li>About Us</li>
        </ul>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="container">
        <div class="coinflip-wrapper">
            <h1>🪙 Flip a Coin</h1>
            <p class="subtitle">Heads or Tails? Let fate decide!</p>

            <div class="coin-container">
                <div class="coin" id="coin">
                    <div class="coin-heads">
                        <span>H</span>
                    </div>
                    <div class="coin-tails">
                        <span>T</span>
                    </div>
                </div>
            </div>

            <div class="result-display">
                <div class="result-text" id="resultText">
                    <span id="resultMessage">Ready to flip!</span>
                </div>
            </div>

            <div class="coin-actions">
                <button class="btn-flip" id="flipBtn">
                    <i class="fa-solid fa-arrow-rotate-right"></i> Flip!
                </button>
                <button class="btn-back" onclick="window.location.href='index.html'">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script src="coinflip.js"></script>
</body>
</html>
